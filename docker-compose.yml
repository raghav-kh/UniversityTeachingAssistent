version: '3.8'

services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: eduai_postgres
    environment:
      POSTGRES_DB: eduai
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d eduai"]
      interval: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: eduai_redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data

  neo4j:
    image: neo4j:5
    container_name: eduai_neo4j
    environment:
      NEO4J_AUTH: neo4j/secret123
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474"   # Browser UI
      - "7687:7687"   # Bolt protocol (app connection)
    volumes:
      - neo4jdata:/data

volumes:
  pgdata:
  redisdata:
  neo4jdata: